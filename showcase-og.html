<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Card · Startup Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #14100c;
    --paper-2: #1a1612;
    --ink: #f54b00;
    --ink-bright: #ff5e15;
    --bone: #f0e6d2;
    --bone-dim: #c4b89e;
    --bone-faint: #8a7f6a;
    --primary: #6e45ff;
  }

  html, body {
    margin: 0; padding: 0;
    background: #000;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Exact OG dimensions */
  .og {
    width: 1200px;
    height: 630px;
    background: var(--paper);
    color: var(--bone);
    position: relative;
    overflow: hidden;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* warm vignette */
  .og::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at top right, rgba(245,75,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(110,69,255,0.10) 0%, transparent 55%);
    pointer-events: none;
  }

  /* heavy grain — feels printed */
  .og::before {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.16;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }

  /* registration marks (corner crosshairs) */
  .reg {
    position: absolute;
    width: 22px; height: 22px;
    color: var(--bone-faint);
    z-index: 10;
  }
  .reg::before, .reg::after {
    content: '';
    position: absolute;
    background: currentColor;
  }
  .reg::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  .reg::after { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
  .reg.tl { top: 28px; left: 28px; }
  .reg.tr { top: 28px; right: 28px; }
  .reg.bl { bottom: 28px; left: 28px; }
  .reg.br { bottom: 28px; right: 28px; }

  /* top row */
  .top {
    position: relative; z-index: 5;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bone-faint);
  }
  .top .left { display: flex; align-items: center; gap: 14px; color: var(--bone); font-weight: 700; }
  .top .left .meteora { color: var(--ink); }
  .top .left .dot {
    width: 9px; height: 9px;
    background: var(--ink);
    box-shadow: 0 0 10px var(--ink);
  }
  .top .right { color: var(--bone-dim); }

  /* center stage */
  .center {
    position: relative; z-index: 5;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 16px;
  }
  .eyebrow .bar {
    flex: 0 0 56px; height: 2px; background: var(--ink);
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 168px;
    line-height: 0.84;
    letter-spacing: -0.005em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title .row1 { display: block; color: var(--bone); }
  .title .row2 {
    display: block;
    color: transparent;
    -webkit-text-stroke: 2.5px var(--bone);
  }

  .at-skyline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--ink);
    margin-top: 18px;
  }

  /* bottom row */
  .bottom {
    position: relative; z-index: 5;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 32px;
    align-items: end;
    border-top: 1px solid rgba(240,230,210,0.22);
    padding-top: 24px;
  }
  .stat { display: flex; flex-direction: column; gap: 6px; }
  .stat .k {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone-faint);
  }
  .stat .v {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--bone);
  }
  .stat .v.ink { color: var(--ink); }

  .stamp {
    width: 116px; height: 116px;
    border: 2.5px solid var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    transform: rotate(-10deg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1.3;
    flex-shrink: 0;
  }

</style>
</head>
<body>
<div class="og">

  <span class="reg tl"></span>
  <span class="reg tr"></span>
  <span class="reg bl"></span>
  <span class="reg br"></span>

  <div class="top">
    <div class="left">
      <span class="dot"></span>
      <span><span class="meteora">METEORA</span> · ECOSYSTEM PROJECTS</span>
    </div>
    <div class="right">SKY-001 · LIMITED RUN</div>
  </div>

  <div class="center">
    <div class="eyebrow">
      <span class="bar"></span>
      <span>VOL. 01 · FRONTIER · SIDE A</span>
    </div>
    <h1 class="title">
      <span class="row1">STARTUP</span>
      <span class="row2">SHOWCASE</span>
    </h1>
    <div class="at-skyline">at Solana Skyline</div>
  </div>

  <div class="bottom">
    <div class="stat">
      <div class="k">Date</div>
      <div class="v ink">FRI · MAY 01</div>
    </div>
    <div class="stat">
      <div class="k">Set time</div>
      <div class="v">1:00 to 4:00 PM</div>
    </div>
    <div class="stat">
      <div class="k">Where</div>
      <div class="v">FL.8 / NYC</div>
    </div>
    <div class="stamp">
      DEMOS<br>+ LUNCH<br>+ HANG
    </div>
  </div>

</div>
</body>
</html>
